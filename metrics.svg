<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="210" viewBox="0 0 1200 210" role="img" aria-label="Research impact metrics">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#08111F"/><stop offset="1" stop-color="#10182C"/></linearGradient>
  <linearGradient id="a" x1="0" y1="0" x2="1" y2="0"><stop stop-color="#38BDF8"/><stop offset="1" stop-color="#A78BFA"/></linearGradient>
</defs>
<rect width="1200" height="210" rx="24" fill="#070B14"/>
<g font-family="Inter,Segoe UI,Arial,sans-serif">
  <text x="50" y="42" fill="#AFC7E8" font-size="15" font-weight="700" letter-spacing="2">SELECTED RESEARCH IMPACT</text>
  <g transform="translate(40 64)">
    <g><rect width="260" height="110" rx="18" fill="url(#bg)" stroke="#38BDF8" stroke-opacity=".35"/><text x="24" y="48" fill="#7DD3FC" font-size="32" font-weight="800">6,112</text><text x="24" y="78" fill="#E5EDF8" font-size="15" font-weight="700">Amazon delivery routes</text><text x="24" y="99" fill="#8496B4" font-size="12">learning-augmented routing</text></g>
    <g transform="translate(280)"><rect width="260" height="110" rx="18" fill="url(#bg)" stroke="#818CF8" stroke-opacity=".35"/><text x="24" y="48" fill="#A5B4FC" font-size="32" font-weight="800">39.9%</text><text x="24" y="78" fill="#E5EDF8" font-size="15" font-weight="700">median score reduction</text><text x="24" y="99" fill="#8496B4" font-size="12">vs nearest-neighbour baseline</text></g>
    <g transform="translate(560)"><rect width="260" height="110" rx="18" fill="url(#bg)" stroke="#A78BFA" stroke-opacity=".35"/><text x="24" y="48" fill="#C4B5FD" font-size="32" font-weight="800">81,941</text><text x="24" y="78" fill="#E5EDF8" font-size="15" font-weight="700">e-commerce orders</text><text x="24" y="99" fill="#8496B4" font-size="12">quasi-causal analysis</text></g>
    <g transform="translate(840)"><rect width="260" height="110" rx="18" fill="url(#bg)" stroke="#22D3EE" stroke-opacity=".35"/><text x="24" y="48" fill="#67E8F9" font-size="32" font-weight="800">14.11 pp</text><text x="24" y="78" fill="#E5EDF8" font-size="15" font-weight="700">adjusted risk increase</text><text x="24" y="99" fill="#8496B4" font-size="12">dispatch breach → late delivery</text></g>
  </g>
  <rect x="40" y="190" width="1120" height="3" rx="2" fill="url(#a)" opacity=".7"/>
</g>
</svg>